/* ---------- 时区 SGT ---------- */
function getSGT(){const now=new Date();const utc=now.getTime()+now.getTimezoneOffset()*60000;return new Date(utc+8*3600000);}
function tKey(){const d=getSGT();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function p2(n){return String(n).padStart(2,'0');}
function sgtDow(){return getSGT().getDay();}
function dateStr(){const d=getSGT();return(d.getMonth()+1)+'月'+d.getDate()+'日';}
function nowISO(){return getSGT().toISOString();}
function daysBetween(a,b){const A=new Date(a+'T00:00:00'),B=new Date(b+'T00:00:00');return Math.round((B-A)/86400000);}

/* ===================================================================
   闯关系统引擎（v6）
   原则：闯关是星星/打卡的"可视化外壳"，通关=打卡确认，不改变积分逻辑。
   关卡链每天0:00按家长发布顺序生成(以SGT业务日为准)，逐关解锁。
   ==================================================================*/
/* 某 task 的关卡类型：boss/hidden/normal（家长配置） */
function levelTypeOf(c,tid){const cf=c.cfg;if(cf.bossTasks&&cf.bossTasks.includes(tid))return'boss';if(cf.hiddenTasks&&cf.hiddenTasks.includes(tid))return'hidden';return'normal';}
/* 进入今日关卡链的任务：daily 任务 + 被标记为 boss 的任务(每周/月演练作品)；隐藏关为彩蛋不进主链 */
function questTaskIds(c){
 const act=activeTasks(c);
 const daily=act.filter(t=>t.freq==='daily').map(t=>t.id);
 const boss=act.filter(t=>(c.cfg.bossTasks||[]).includes(t.id)).map(t=>t.id);
 const ids=[];daily.forEach(id=>{if(!ids.includes(id))ids.push(id);});boss.forEach(id=>{if(!ids.includes(id))ids.push(id);});
 /* 按家长设定顺序 levelOrder 排序，其余追加在后 */
 const ord=c.cfg.levelOrder||[];
 ids.sort((a,b)=>{const ia=ord.indexOf(a),ib=ord.indexOf(b);if(ia<0&&ib<0)return 0;if(ia<0)return 1;if(ib<0)return -1;return ia-ib;});
 /* BOSS 关排到普通关之后，营造"先小怪后BOSS"的节奏 */
 ids.sort((a,b)=>{const ba=levelTypeOf(c,a)==='boss'?1:0,bb=levelTypeOf(c,b)==='boss'?1:0;return ba-bb;});
 return ids;
}
/* 生成/获取今日关卡链（每天0:00自动按业务日切换；幂等） */
function genLevels(c,k){k=k||tKey();if(!c.levelDays)c.levelDays={};
 const cur=c.levelDays[k];const ids=questTaskIds(c);
 if(cur&&cur.gen){
  /* 同一天若家长发布了新顺序：仅在尚无任何关卡通关时才重排，已通关记录不变(草稿-发布:当天已打卡星值不变) */
  return cur;
 }
 c.levelDays[k]={gen:true,order:ids,type:{}};
 ids.forEach(id=>{c.levelDays[k].type[id]=levelTypeOf(c,id);});
 return c.levelDays[k];
}
/* 关卡状态：locked/current/submitted/cleared（由当日打卡数据派生，单一数据源=dd().done/pending/rejected） */
/* v8.2 批量提交：前置关 done(已确认) 或 pending(已提交) 即解锁下一关，孩子可连续提交所有关；记星仍由家长逐关确认 */
function levelStatus(c,k,idx){const day=dd(c,k);const ld=c.levelDays[k];if(!ld)return'locked';const id=ld.order[idx];
 if(day.done.includes(id))return'cleared';
 if(day.pending.includes(id))return'submitted';
 /* current = 第一个未提交关卡；其前置全部 done 或 pending 才解锁 */
 for(let i=0;i<idx;i++){const pid=ld.order[i];if(!day.done.includes(pid)&&!day.pending.includes(pid))return'locked';}
 return'current';
}
function allCleared(c,k){k=k||tKey();const ld=c.levelDays[k];if(!ld||!ld.order.length)return false;const day=dd(c,k);return ld.order.every(id=>day.done.includes(id));}
/* 概率掉落一个宝箱奖励（内容池家长可配，自动归一化） */
function rollChest(c){const pool=(c.cfg.chestPool||[]).filter(p=>p.active!==false&&p.prob>0);if(!pool.length)return{type:'star',value:3,label:'⭐ 3颗星星'};
 let tot=pool.reduce((s,p)=>s+p.prob,0);let r=Math.random()*tot;for(const p of pool){r-=p.prob;if(r<=0)return{type:p.type,value:p.value,label:p.label};}return{type:pool[0].type,value:pool[0].value,label:pool[0].label};}
function grantChest(c,trigger){const reward=rollChest(c);c.chests.unshift({id:uid(),trigger,reward,opened:false,ts:nowISO()});notify(c,'child','🎁 获得一个宝箱，快去打开！');}
/* 章节：每月一个，自动开启/结算 */
function curMonth(){const d=getSGT();return d.getFullYear()+'-'+p2(d.getMonth()+1);}
function ensureSeason(c){const m=curMonth();
 if(c.season&&c.season.month!==m){/* 跨月：结算上月章节 */settleSeason(c);}
 if(!c.season){c.season={id:uid(),title:'自律星球 · '+(getSGT().getMonth()+1)+'月章',month:m,target:30,progress:0,reward:'章节宝箱+专属勋章'};}
 return c.season;}
function settleSeason(c){if(!c.season)return;const s=c.season;s.status='settled';c.seasons.unshift(s);
 const hit=s.target>0&&s.progress>=s.target;
 if(hit){addStar(c,10,'milestone','章节达成：'+s.title);grantChest(c,'allclear');notify(c,'child','🏆 '+s.title+' 已结算，获得章节大奖！');}
 else notify(c,'parent','上月章节未达标已结算：'+s.title);
 c.season=null;}
function bumpSeason(c,n){ensureSeason(c);c.season.progress+=(n||1);}

/* ====================================================================
   v8.0 联网版 · 云数据层（Supabase 多设备实时同步 + 本地离线兜底）
   --------------------------------------------------------------------
   设计原则（关键）：所有既有业务代码继续同步调用 root()/saveRoot()/R()/
   child()/saveChild()，其内部实现改为读写「内存缓存 CACHE」。CACHE 由云端
   （或本地）异步同步填充与回写，业务层零改动、规则零改动。
   - 在线且已配置 Supabase：CACHE ↔ child_state 表（jsonb 整存现有 child 对象）；
     提交→event_log(pending)，确认→event_log(confirmed)+child_state；
     用 Realtime 订阅 child_state/event_log，对端变更触发 render()。
   - 未配置或离线：CACHE ↔ localStorage（键沿用 gracie_v3），并用
     BroadcastChannel 在「同一浏览器多标签页」间实时广播，便于本地联调与离线使用。
   - 断网：继续读 CACHE/localStorage（历史数据可见）；写操作进 OUTBOX 待补传，
     恢复网络后自动 flush 同步。
   ==================================================================== */
const CLOUD = {
  cfg:(window.SUPABASE_CONFIG||{}),
  sb:null,            /* supabase client */
  enabled:false,      /* 是否启用云端（已配置 + SDK 可用） */
  online:(typeof navigator!=='undefined')?navigator.onLine!==false:true,
  session:null,       /* supabase auth session（家长/管理员） */
  familyId:null,
  childIdMap:{},      /* 本地 child.id -> 云端 child.uuid */
  realtimeCh:null,
  bc:null,            /* BroadcastChannel 跨标签页 */
  outbox:[],          /* 离线待补传 [{kind,childLocalId,data,ts}] */
  _needFamily:false,  /* v8.1：登录后无家庭时为 true，触发「创建/加入家庭」二选一 */
  inviteCode:null,    /* v8.1：当前家庭邀请码（登录后取回，后台可展示分享） */
  familyName:null,
  memberRole:null,
  ready:false
};
let CACHE=null;       /* 内存中的 root 对象（业务层的唯一数据源） */
const ROOT_LOCAL=ROOT;          /* localStorage 键沿用 gracie_v3 */
const OUTBOX_KEY=ROOT+'_outbox';

/* ---- 判定云端是否可用：两项配置齐全 + SDK 已加载 ---- */
function cloudConfigured(){return !!(CLOUD.cfg && CLOUD.cfg.url && CLOUD.cfg.anonKey);}
function cloudActive(){return CLOUD.enabled && CLOUD.online && !!CLOUD.sb && !!CLOUD.session && !!CLOUD.familyId;}
/* cloudEngaged：已进入云端模式（已登录家庭账号），不要求当前在线——离线时写操作进 OUTBOX 待补传 */
function cloudEngaged(){return CLOUD.enabled && !!CLOUD.sb && !!CLOUD.session && !!CLOUD.familyId;}

/* ---- 初始化云端客户端（在 init 早期调用，异步） ---- */
async function cloudInit(){
  /* BroadcastChannel：本地/离线模式下的跨标签页实时（也作为云端模式的本机即时回显） */
  try{ if('BroadcastChannel' in window){ CLOUD.bc=new BroadcastChannel('gracie_sync'); CLOUD.bc.onmessage=onLocalBroadcast; } }catch(e){}
  /* 网络状态监听 */
  window.addEventListener('online',()=>{CLOUD.online=true;cloudFlushOutbox();cloudPullAll();});
  window.addEventListener('offline',()=>{CLOUD.online=false;});
  /* 载入离线待补传 */
  try{const o=localStorage.getItem(OUTBOX_KEY);if(o)CLOUD.outbox=JSON.parse(o)||[];}catch(e){CLOUD.outbox=[];}
  if(cloudConfigured() && window.supabase && window.supabase.createClient){
    try{
      CLOUD.sb=window.supabase.createClient(CLOUD.cfg.url,CLOUD.cfg.anonKey,{auth:{persistSession:true,autoRefreshToken:true}});
      CLOUD.enabled=true;
      const {data}=await CLOUD.sb.auth.getSession();
      if(data&&data.session){CLOUD.session=data.session;await cloudAfterLogin();}
      CLOUD.sb.auth.onAuthStateChange((_ev,sess)=>{CLOUD.session=sess;});
    }catch(e){console.warn('Supabase 初始化失败，回退本地模式：',e);CLOUD.enabled=false;}
  }
  CLOUD.ready=true;
}

/* ---- 登录成功后：解析 family、拉取全部孩子数据进 CACHE、挂载 Realtime ---- */
async function cloudAfterLogin(){
  if(!CLOUD.sb||!CLOUD.session)return;
  try{
    const uid=CLOUD.session.user.id;
    let {data:mem}=await CLOUD.sb.from('member').select('family_id,role').eq('auth_user_id',uid).limit(1);
    if(!mem||!mem.length){
      CLOUD._needFamily=true;
      CLOUD.familyId=null;
      return;
    }
    CLOUD._needFamily=false;
    CLOUD.familyId=mem[0].family_id;CLOUD.memberRole=mem[0].role;
    /* v8.1：取回本家庭邀请码，供后台管理端展示/分享 */
    try{const {data:fam}=await CLOUD.sb.from('family').select('invite_code,family_name').eq('id',CLOUD.familyId).limit(1).single();if(fam){CLOUD.inviteCode=fam.invite_code;CLOUD.familyName=fam.family_name;}}catch(e){}
    await cloudPullAll();
    cloudSubscribeRealtime();
  }catch(e){console.warn('cloudAfterLogin 失败：',e);}
}

/* ---- 从云端拉取本家庭所有孩子 → 合成 root 对象写入 CACHE ---- */
async function cloudPullAll(){
  if(!cloudActive())return false;
  try{
    const {data:kids}=await CLOUD.sb.from('child').select('id,name,login_pin').eq('family_id',CLOUD.familyId);
    const {data:states}=await CLOUD.sb.from('child_state').select('child_id,data,updated_at');
    const stMap={};(states||[]).forEach(s=>{stMap[s.child_id]=s;});
    let r=CACHE||localGetRoot()||initRoot();
    /* 用云端覆盖/补全 childData；保留 root 级 adminCred/parentCred（来自本地或默认） */
    if(kids&&kids.length){
      const childData={},children=[];CLOUD.childIdMap={};
      kids.forEach(k=>{
        const st=stMap[k.id];
        let cobj=(st&&st.data&&st.data.id)?st.data:freshChild(k.name);
        cobj.name=k.name; CLOUD.childIdMap[cobj.id]=k.id; cobj._cloudId=k.id;
        childData[cobj.id]=cobj;children.push(cobj.id);
      });
      r.childData=childData;r.children=children;if(!r.curChild||!childData[r.curChild])r.curChild=children[0];
    }
    CACHE=r;localSaveRoot(r);
    if(typeof ROLE!=='undefined'&&ROLE)render();
    return true;
  }catch(e){console.warn('cloudPullAll 失败：',e);return false;}
}

/* ---- Realtime 订阅：child_state(update) + event_log(insert/update) ---- */
function cloudSubscribeRealtime(){
  if(!cloudActive())return;
  try{
    if(CLOUD.realtimeCh){CLOUD.sb.removeChannel(CLOUD.realtimeCh);CLOUD.realtimeCh=null;}
    CLOUD.realtimeCh=CLOUD.sb.channel('family_'+CLOUD.familyId)
      .on('postgres_changes',{event:'*',schema:'public',table:'child_state'},onRealtimeStateChange)
      .on('postgres_changes',{event:'*',schema:'public',table:'event_log'},onRealtimeEvent)
      .subscribe();
  }catch(e){console.warn('Realtime 订阅失败：',e);}
}
/* 对端更新了某孩子 state → 合并进 CACHE → 节流重绘
   v8.3 防跳动闪烁：
   1) 忽略本端刚写入的回推——比对回推 updated_at 与本端最近一次推送时间，
      若在 1500ms 容差内则认定是自己刚写的回声，直接 return，避免 A 写→云回推→A 重绘→
      （某些路径再触发写）的来回循环。
   2) 内容相同不重绘——用 JSON.stringify 比对新旧孩子数据，完全一致则直接 return，
      避免无意义的整页重建造成闪烁。 */
function onRealtimeStateChange(payload){
  try{
    const row=payload.new||payload.record;if(!row||!row.data)return;
    const cobj=row.data;if(!cobj||!cobj.id)return;
    /* 防循环：忽略本端刚写回推（updated_at 落在本端最近推送时间 +1500ms 容差内） */
    const incTs=row.updated_at?new Date(row.updated_at).getTime():0;
    const lastPush=(CLOUD._lastPushTs&&CLOUD._lastPushTs[cobj.id])||0;
    if(incTs&&lastPush&&incTs<=lastPush+1500)return;
    if(!CACHE)CACHE=localGetRoot()||initRoot();
    /* 内容相同不重绘：与现有 CACHE 中该孩子数据逐字节比对，一致则跳过 */
    const prev=CACHE.childData?CACHE.childData[cobj.id]:null;
    if(prev&&JSON.stringify(prev)===JSON.stringify(cobj))return;
    cobj._cloudId=row.child_id;CLOUD.childIdMap[cobj.id]=row.child_id;
    CACHE.childData[cobj.id]=cobj;if(!CACHE.children.includes(cobj.id))CACHE.children.push(cobj.id);
    localSaveRoot(CACHE);
    if(typeof ROLE!=='undefined'&&ROLE)scheduleRender();
  }catch(e){console.warn('onRealtimeStateChange',e);}
}
/* 新的/变更的 event_log → 家长端有 pending 时提示；触发 render 刷新待确认 */
function onRealtimeEvent(payload){
  try{
    const row=payload.new||payload.record;if(!row)return;
    if(row.status==='pending'&&(REALROLE==='parent'||REALROLE==='admin')){
      toast&&toast('🔔 收到新的待确认：'+(row.type||'打卡'));
    }
    if(typeof ROLE!=='undefined'&&ROLE)scheduleRender();
  }catch(e){console.warn('onRealtimeEvent',e);}
}

/* ---- BroadcastChannel：同浏览器跨标签页实时（本地/离线模式核心，也用于云端本机即时回显） ---- */
function broadcastLocal(kind,childLocalId){
  try{ if(CLOUD.bc) CLOUD.bc.postMessage({kind,childLocalId,ts:Date.now(),from:_TAB_ID}); }catch(e){}
}
const _TAB_ID=Math.random().toString(36).slice(2);
function onLocalBroadcast(ev){
  const m=ev.data;if(!m||m.from===_TAB_ID)return;
  /* 其它标签页改了数据 → 从 localStorage 重载 CACHE → render（实现"另一端实时刷新"） */
  const fresh=localGetRoot();if(fresh){CACHE=fresh;if(typeof ROLE!=='undefined'&&ROLE)scheduleRender();}
}

/* ---- localStorage 底层读写（CACHE 的持久化兜底） ---- */
function localGetRoot(){try{const r=localStorage.getItem(ROOT_LOCAL);if(r)return JSON.parse(r);}catch(e){}return null;}
function localSaveRoot(r){try{localStorage.setItem(ROOT_LOCAL,JSON.stringify(r));}catch(e){}}

/* ---- 把某个孩子整体写入云端 child_state（带 updated_at 乐观信息） ----
   v8.3：upsert 前记录本端推送时间戳 CLOUD._lastPushTs[cobj.id]，
   供 onRealtimeStateChange 识别并忽略本端刚写入产生的 Realtime 回推，打断闪烁循环。 */
async function cloudPushChild(cobj){
  if(!cloudActive()){pushOutbox('state',cobj.id,cobj);return false;}
  try{
    let cloudId=cobj._cloudId||CLOUD.childIdMap[cobj.id];
    if(!cloudId){ /* 云端尚无此孩子 → 建 child 行 */
      const {data:nc}=await CLOUD.sb.from('child').insert({family_id:CLOUD.familyId,name:cobj.name,login_pin:(cobj.cred&&cobj.cred.pin)||'1234'}).select().single();
      if(nc){cloudId=nc.id;CLOUD.childIdMap[cobj.id]=cloudId;cobj._cloudId=cloudId;}
    }
    if(cloudId){
      /* 记录本端推送时间戳，用于回推去重（防循环） */
      if(!CLOUD._lastPushTs)CLOUD._lastPushTs={};
      CLOUD._lastPushTs[cobj.id]=Date.now();
      await CLOUD.sb.from('child_state').upsert({child_id:cloudId,data:cobj,updated_at:new Date().toISOString()},{onConflict:'child_id'});
    }
    return true;
  }catch(e){console.warn('cloudPushChild 失败，转入 outbox：',e);pushOutbox('state',cobj.id,cobj);return false;}
}
function pushOutbox(kind,childLocalId,data){CLOUD.outbox.push({kind,childLocalId,data,ts:Date.now()});try{localStorage.setItem(OUTBOX_KEY,JSON.stringify(CLOUD.outbox));}catch(e){}}
async function cloudFlushOutbox(){
  /* v8.2：state 类需家长 session(cloudActive)；event 类(孩子提交)只需 sb+online，走 Edge Function */
  if((!cloudActive()&&!(CLOUD.sb&&CLOUD.online))||!CLOUD.outbox.length)return;
  const items=CLOUD.outbox.slice();CLOUD.outbox=[];try{localStorage.removeItem(OUTBOX_KEY);}catch(e){}
  const remain=[];
  for(const it of items){
    try{
      if(it.kind==='state'){
        if(cloudActive()){const cobj=(CACHE&&CACHE.childData[it.childLocalId])||it.data;await cloudPushChild(cobj);}
        else remain.push(it);
      }else if(it.kind==='event'){
        /* v8.2：孩子端离线提交补传——重放 child-submit Edge Function */
        const d=it.data||{};
        const cobj=(CACHE&&CACHE.childData[it.childLocalId])||null;
        const cloudId=(d.cloudId)||(cobj&&(cobj._cloudId||CLOUD.childIdMap[cobj.id]))||CLOUD.childIdMap[it.childLocalId];
        const cred=(cobj&&cobj.cred)||{};
        if(CLOUD.sb&&cloudId){
          const {error}=await CLOUD.sb.functions.invoke('child-submit',{body:{child_id:cloudId,pin_hash:cred.hash||'',pin_salt:cred.salt||'',type:d.type,payload:d.payload||{}}});
          if(error)remain.push(it);
        }else remain.push(it);
      }
    }catch(e){remain.push(it);}
  }
  if(remain.length){CLOUD.outbox=remain;try{localStorage.setItem(OUTBOX_KEY,JSON.stringify(CLOUD.outbox));}catch(e){}}
}

/* ====================================================================
   v8.2 跨设备同步修复：孩子端「Edge Function」提交
   --------------------------------------------------------------------
   根因：孩子端通过「选孩子 + 4位PIN」进入，不持有 Supabase Auth session，
   旧逻辑 cloudActive() 返回 false，提交只做本地 BroadcastChannel 广播
   （仅同浏览器跨标签页有效，跨设备无效），导致另一台设备的家长端收不到待确认。
   修复：改为调用 Edge Function `child-submit`——用 child_id + PIN 在函数内自校验，
   函数内以 service_role 写 event_log(pending) 并按需合并 child_state，
   从而绕过「孩子端无邮箱 session 无法写云端」的限制，实现真正的跨设备同步。
   触发条件只需 CLOUD.sb 已就绪（anon 客户端，无需 session）+ 已知云端 child_id。
   --------------------------------------------------------------------
   PIN 传递方式：前端 PIN 以哈希 cred:{salt,hash} 存储，无明文。本函数发送
   pin_hash(=cred.hash) 与 pin_salt(=cred.salt)，Edge Function 读取该孩子云端
   child_state.data.cred 比对哈希（或回退比对 child.login_pin 明文列），校验通过
   才写库。孩子端不额外保存/传输明文 PIN，前后端统一使用同一哈希算法(hashPwd)。
   --------------------------------------------------------------------
   兜底：调用失败/异常或离线/无 child_id 时，保留本地广播（同浏览器即时回显）
   并写入离线 OUTBOX（event 类型），待网络恢复由 cloudFlushOutbox() 重放补传。
   ==================================================================== */
async function childSubmitEvent(type,payload){
  const r=R();const c=child(r);
  const cloudId=c._cloudId||CLOUD.childIdMap[c.id];
  const cred=c.cred||{};
  if(CLOUD.sb&&cloudId&&CLOUD.online){
    try{
      const {error}=await CLOUD.sb.functions.invoke('child-submit',{
        body:{child_id:cloudId,pin_hash:cred.hash||'',pin_salt:cred.salt||'',type:type,payload:payload||{}}
      });
      if(!error){broadcastLocal('event',c.id);return true;}
      console.warn('child-submit 失败，转入本地广播+OUTBOX 兜底：',error);
    }catch(e){console.warn('child-submit 异常，转入本地广播+OUTBOX 兜底：',e);}
  }
  /* 兜底：本地广播（同浏览器跨标签页即时）+ 离线 OUTBOX（待网络恢复重放） */
  broadcastLocal('event',c.id);
  pushOutbox('event',c.id,{type:type,payload:payload||{},cloudId:cloudId||null});
  return false;
}
/* ---------- 存取（v8.0：业务层同步接口不变，内部走 CACHE + 云端/本地） ---------- */
/* root()：返回内存 CACHE；首次从 localStorage 兜底载入（云端数据由 cloudPullAll 异步填充） */
function root(){ if(CACHE)return CACHE; const r=localGetRoot(); if(r)CACHE=r; return CACHE; }
/* saveRoot()：写 CACHE + 本地持久化 + 跨标签页广播；并把所有孩子推送云端(异步,不阻塞业务) */
function saveRoot(r){ CACHE=r; localSaveRoot(r);
  try{ broadcastLocal('root',null);
    if(typeof cloudEngaged==='function'&&cloudEngaged()&&r&&r.childData){ for(const id in r.childData){ cloudPushChild(r.childData[id]); } }
  }catch(e){}
}

function initRoot(){const c=freshChild('Gracie');return{adminCred:makeCred('8888'),parentCred:makeCred('1234'),children:[c.id],childData:{[c.id]:c},curChild:c.id,seq:1};}
function migrateChild(c){
 /* 兼容旧数据：补全 holiday 结构 */
 if(!c.holiday){const hc=c.holidayCfg||{freeWeekday:30,freeWeekend:60};c.holiday={enabled:false,start:'',end:'',freeWeekday:hc.freeWeekday,freeWeekend:hc.freeWeekend,bankCap:0,coreNeed:2,overtimePenalty:1,redlineLite:true,noStreakBreak:true};}
 const d=c.holiday;if(d.enabled===undefined)d.enabled=false;if(d.start===undefined)d.start='';if(d.end===undefined)d.end='';
 if(d.freeWeekday===undefined)d.freeWeekday=30;if(d.freeWeekend===undefined)d.freeWeekend=60;
 if(d.bankCap===undefined)d.bankCap=0;if(d.coreNeed===undefined)d.coreNeed=2;
 if(d.overtimePenalty===undefined)d.overtimePenalty=1;if(d.redlineLite===undefined)d.redlineLite=true;
 if(d.noStreakBreak===undefined)d.noStreakBreak=true;
 /* 闯关系统字段补全（v6） */
 const cf=c.cfg;
 if(cf.questOn===undefined)cf.questOn=true;
 if(!Array.isArray(cf.levelOrder))cf.levelOrder=[];
 if(!Array.isArray(cf.bossTasks))cf.bossTasks=[];
 if(!Array.isArray(cf.hiddenTasks))cf.hiddenTasks=[];
 if(cf.allClearBonus===undefined)cf.allClearBonus=5;
 if(!Array.isArray(cf.chestPool)||!cf.chestPool.length)cf.chestPool=JSON.parse(JSON.stringify(DEF_CHEST_POOL));

/* 连续打卡判定：普通=当日≥1个已确认daily任务；假期=已确认daily任务数≥holiday.coreNeed[假设] */
function dailyCoreDone(c,k){const day=dd(c,k);const dailyIds=activeTasks(c).filter(t=>t.freq==='daily').map(t=>t.id);const cnt=day.done.filter(id=>dailyIds.includes(id)).length;if(isHoliday(c))return cnt>=Math.max(1,c.holiday.coreNeed);return cnt>=1;}
function updateStreak(c){
 const today=tKey();const st=c.streak;
 if(c.mode==='leave'||c.mode==='travel'){return;} /* 请假/旅行不计断签 */
 if(isHoliday(c)&&c.holiday.noStreakBreak){ /* 假期不计断签：达标则照常+1，未达标也不清零(冻结保留) */ if(!dailyCoreDone(c,today))return; }
 else if(!dailyCoreDone(c,today))return;
 if(st.last===today)return;
 if(st.last){const gap=daysBetween(st.last,today);const tol=isHoliday(c)&&c.holiday.noStreakBreak?9999:c.cfg.breakDays;
  if(gap===1)st.current+=1;
  else if(gap>tol){
   /* v7.1 补丁#8(P-08)：断签按缺口天数扣卡，卡不够则重置(不再只扣1张) */
   const need=gap-1; /* 需补天数 = 间隔-1（缺口天数） */

   if(have>=need){
    c.items.streakFreeze-=need; /* 按缺口数量扣卡 */
    dd(c).freezeUsed=true;st.current+=1;
    notify(c,'child','🛡️ 自动消耗 '+need+' 张连击保护卡，连续记录已保住！');

   }else{
    st.current=1; /* 卡不够直接重置 */
    if(have>0){c.items.streakFreeze=0;dd(c).freezeUsed=true;
     notify(c,'child','保护卡不足（需'+need+'张仅'+have+'张），连续记录已重置');
     notify(c,'parent',c.name+' 断签'+need+'天，保护卡不足（'+have+'张），连续记录已重置');}
   }
  }
  else st.current+=1;}
 else st.current=1;
 st.last=today;if(st.current>st.max)st.max=st.current;
 checkPetTravel(c); /* v7 M039：连击达标触发宠物旅行 */

 checkMedals(c);
}

/* M038：随机授予一件未拥有的收藏品（装备/坐骑/徽章）；写入图鉴 collection */
function grantCollectible(c,forceType){
 const types=forceType?[forceType]:['equipment','mounts','badges'];
 let pool=[];types.forEach(tp=>{COLLECT_DEFS[tp].forEach(it=>{if(!c.collection[tp].includes(it.id))pool.push({tp,it});});});
 if(!pool.length){/* 已集齐则随机重复给（仍展示） */types.forEach(tp=>{COLLECT_DEFS[tp].forEach(it=>pool.push({tp,it}));});}
 if(!pool.length)return null;
 /* 稀有度加权：普通更易出 */
 const w={common:50,rare:28,epic:16,legend:6};
 let tot=pool.reduce((s,x)=>s+w[x.it.rarity],0),rnd=Math.random()*tot,pick=pool[0];
 for(const x of pool){rnd-=w[x.it.rarity];if(rnd<=0){pick=x;break;}}
 if(!c.collection[pick.tp].includes(pick.it.id))c.collection[pick.tp].push(pick.it.id);
 checkSetTitles(c);notify(c,'child','图鉴新收藏：'+pick.it.ico+' '+pick.it.name+'（'+RARITY_LABEL[pick.it.rarity]+'）');

function computeForm(c){const e=c.evoCfg,ls=c.lifetimeStars||0,sk=(c.streak&&c.streak.max)||0;
 let form='sprout';
 if(ls>=e.grow_star)form='grow';

/* ===================================================================

function focusAvailSec(c){if(!c.focus.running)return c.focus.durMin*60;const remain=Math.ceil((c.focus.deadline-Date.now())/1000);return Math.max(0,remain);}
function setFocusDur(m){const r=R(),c=child(r);if(c.focus.running){toast('专注进行中，结束后再调整');return;}c.focus.durMin=m;saveChild(r,c);render();}
function focusStart(){const r=R(),c=child(r);if(c.focus.running){toast('已经在专注中啦');return;}
 const dur=Math.min(FOCUS_MAX,Math.max(FOCUS_MIN,c.focus.durMin||25));
 c.focus={running:true,startTs:Date.now(),durMin:dur,deadline:Date.now()+dur*60000};
 saveChild(r,c);runFocusLoop();render();toast('🌱 已种下树苗，专注 '+dur+' 分钟，中途离开树会枯萎哦');}
/* 中途放弃：树枯萎，无奖励（损失厌恶） */
function focusGiveUp(){const r=R(),c=child(r);if(!c.focus.running)return;
 if(!confirm('现在离开，小树会枯萎且没有奖励，确定吗？'))return;
 const dur=c.focus.durMin;c.forest.trees.unshift({date:tKey(),duration:dur,alive:false,ts:nowISO()});
 c.focus.running=false;if(FOCUS_TIMER){clearInterval(FOCUS_TIMER);FOCUS_TIMER=null;}
 saveChild(r,c);render();toast('🥀 小树枯萎了，下次坚持到底就能收获森林～');}
/* 完成：树长成，专注时长换星星(每5分钟+1★)+时间币(1分钟专注=1分钟存折) */
function focusComplete(c,actualMin){const dur=actualMin||c.focus.durMin;const day=dd(c);
 c.forest.trees.unshift({date:tKey(),duration:dur,alive:true,ts:nowISO()});
 c.forest.totalFocusMin+=dur;c.forest.sessions+=1;day.focusMin+=dur;day.focusCnt+=1;
 const star=Math.floor(dur/5);const screen=dur;/* 双货币接入：星星 + 阅读存折时间币 */
 if(star>0)addStar(c,star,'task','专注森林 '+dur+'分钟');
 c.bank+=screen;day.bankAdded+=screen;
 c.focus.running=false;if(FOCUS_TIMER){clearInterval(FOCUS_TIMER);FOCUS_TIMER=null;}
 notify(c,'parent','专注森林完成：'+dur+'分钟 (+'+star+'★ +'+screen+'分钟存折)');
 CELE={emoji:'🌳',t:'小树长成了！',s:'专注 '+dur+' 分钟，+'+star+'★ 与 '+screen+' 分钟存折已到账'};}
function focusFinishNow(){const r=R(),c=child(r);if(!c.focus.running)return;const el=Math.floor((Date.now()-c.focus.startTs)/1000/60);
 if(el<c.focus.durMin){/* 未到时间手动点完成视为提前结束=枯萎 */focusGiveUp();return;}
 focusComplete(c,c.focus.durMin);saveChild(r,c);render();}
let FOCUS_TIMER=null;
function runFocusLoop(){if(FOCUS_TIMER)clearInterval(FOCUS_TIMER);FOCUS_TIMER=setInterval(()=>{const c=child(R());if(!c.focus.running){clearInterval(FOCUS_TIMER);FOCUS_TIMER=null;return;}
 const remain=Math.ceil((c.focus.deadline-Date.now())/1000);const cl=document.getElementById('focusClock');
 if(remain<=0){const r=R(),cc=child(r);focusComplete(cc,cc.focus.durMin);saveChild(r,cc);render();return;}
 if(cl)cl.textContent=fmtClock(remain);const total=c.focus.durMin*60;const grown=1-remain/total;
 const tr=document.getElementById('focusTree');if(tr)tr.textContent=grown<.33?'🌱':grown<.7?'🌿':'🌳';},500);}

 /* v7.1 补丁#9(P-09)：宠物旅行加在途时长校验，未到时长不能秒收 */
 /* v7.3 补丁T-2：改用 lastTravelMs(Date.now() 毫秒时间戳) 计算在途时长，
    不再依赖 SGT 字符串时间，避免非 UTC+8 设备本地时区偏移导致判断错误。
    兼容旧数据：缺 lastTravelMs 时回退用 lastTravel(ISO) 换算；两者都缺则视为已满足(允许归来，避免卡死)。 */
 const TRAVEL_MS=2*3600000; /* 在途 2 小时（可调） */

 if(!dep&&c.pet2.lastTravel){const _t=new Date(c.pet2.lastTravel).getTime();dep=isNaN(_t)?0:_t;}

    视为已满足在途时长，允许归来，避免旧用户被锁死。 */
 if(dep>Date.now()+5*60000){dep=0;}
 const elapsed=dep>0?(Date.now()-dep):TRAVEL_MS;/* 无出发时刻则不阻拦归来 */
 if(elapsed<TRAVEL_MS){
  const leftMin=Math.ceil((TRAVEL_MS-elapsed)/60000);
  toast('🧳 宠物还在旅行途中，约 '+leftMin+' 分钟后归来');return;
 }
 const g=PET_GIFTS[Math.floor(Math.random()*PET_GIFTS.length)];let label=g.label;

 c.pet2.traveling=false;c.pet2.lastTravelMs=0;/* v7.3 补丁T-2：归来后清零出发时间戳 */c.pet2.level=petLevelOf(c);c.pet2.mood=petMood(c);
 saveChild(r,c);BOX={emoji:'🧳',label:label};showBox();render();toast('宠物旅行归来！');}

function weekRange(offset){const out=[];const base=getSGT();base.setDate(base.getDate()-(offset||0)*7);for(let i=6;i>=0;i--){const d=new Date(base);d.setDate(base.getDate()-i);out.push(d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate()));}return out;}
function weekStats(c,offset){const days=weekRange(offset);let stars=0,focus=0,doneCnt=0,total=0,read=0;const dailyIds=activeTasks(c).filter(t=>t.freq==='daily').map(t=>t.id);
 for(const k of days){const d=c.daily[k];total+=dailyIds.length;if(d){stars+=d.stEarned||0;focus+=d.focusMin||0;read+=d.rdMins||0;doneCnt+=(d.done||[]).filter(id=>dailyIds.includes(id)).length;}}
 const rate=total>0?Math.round(doneCnt/total*100):0;return{stars,focus,read,rate,doneCnt};}
/* v7.1 补丁#1(P-01)：M046 月报独立统计——按自然月聚合 daily */
function monthStats(c){
 const ym=curMonth();
 let stars=0,focus=0,read=0,doneCnt=0,total=0,activeDays=0;
 const dailyIds=activeTasks(c).filter(t=>t.freq==='daily').map(t=>t.id);
 for(const k in c.daily){
  if(k.slice(0,7)!==ym)continue;
  const d=c.daily[k];total+=dailyIds.length;activeDays++;
  stars+=d.stEarned||0;focus+=d.focusMin||0;read+=d.rdMins||0;
  doneCnt+=(d.done||[]).filter(id=>dailyIds.includes(id)).length;
 }
 const rate=total>0?Math.round(doneCnt/total*100):0;
 return{ym,stars,focus,read,rate,activeDays};
}

function calcJump(c){let min=0,st=0;for(const[k,m,t]of JT){if(c>=k){min=m;st=t;break;}}return{min,st};}
function childJump(){
 const cnt=parseInt(gv('jmpInp'))||0;if(cnt<500){toast('至少跳500个才能换');return;}
 const r=R(),c=child(r);const day=dd(c);
 if(ROLE==='parent'){doJumpGrant(c,cnt);saveChild(r,c);render();toast('🪢 跳绳'+cnt+'个已记入');}

}
function doJumpGrant(c,cnt){const{min,st}=calcJump(cnt);const day=dd(c);const prev=day.jSt||0;day.jCnt=cnt;day.jMin=min;day.jSt=st;c.lifetimeJump+=cnt;const diff=Math.max(0,st-prev);if(diff>0)addStar(c,diff,'task','跳绳'+cnt+'个');}

/* ===== 屏幕时间使用 ===== */
function addScr(mins){
 const r=R(),c=child(r);const day=dd(c);
 const fm=day.rl?0:freeMin(c),jm=day.rl?0:day.jMin;
 const prev=day.scrUsed;day.scrUsed+=mins;
 const pb=Math.max(0,prev-fm-jm),nb=Math.max(0,day.scrUsed-fm-jm),delta=nb-pb;
 if(delta>0){
  if(delta>c.bank){
   const ot=delta-c.bank;day.bankUsed+=c.bank;c.bank=0;
   /* 假期超时更宽松[假设]：仅扣完存折、不强制次日暂停；普通：清零并次日娱乐暂停 */
   if(isHoliday(c)){saveChild(r,c);render();toast('🏖️ 假期超时'+ot+'分钟，存折已用完（不额外惩罚）');return;}
   else{day.overPause=true;saveChild(r,c);render();toast('⚠️ 超时'+ot+'分钟！存折清零，次日娱乐暂停');return;}
  }else{c.bank-=delta;day.bankUsed+=delta;}
 }
 saveChild(r,c);render();toast('📱 已记录'+mins+'分钟娱乐屏幕');
}

/* v7.3 补丁T-3：判断是否为带 bucket 标记的三分罐流水（分配 alloc / 罐取出 *_spend）。
   此类流水与三罐余额强绑定，禁止编辑/删除，避免罐余额与流水记录不一致。 */
function isBucketLog(rec){return !!(rec&&rec.bucket);}
function openMoney(id){
 /* v7.3 补丁T-3：拦截对三分罐流水的编辑 */
 if(id){const _c=child(R());const _rec=_c.money_log.find(x=>x.id===id);if(isBucketLog(_rec)){toast('三分罐流水不可编辑（与罐余额绑定）');return;}}
 MEDIT=id||null;setText('mMoneyTtl',id?'修改记录':(ROLE==='child'?'申请零花钱记录':'新增零花钱记录'));
 if(id){const c=child(R());const rec=c.money_log.find(x=>x.id===id);if(rec){MTYPE=rec.amount>=0?'in':'out';sv('mMoneyAmt',Math.abs(rec.amount));sv('mMoneyDesc',rec.source);}}
 else{MTYPE='in';sv('mMoneyAmt','');sv('mMoneyDesc','');}

function setMoneyType(t){MTYPE=t;cls('msIn','seg-b'+(t==='in'?' on-in':''));cls('msOut','seg-b'+(t==='out'?' on-out':''));}
function saveMoney(){
 const amt=parseFloat(gv('mMoneyAmt'))||0;const desc=gv('mMoneyDesc').trim()||(MTYPE==='in'?'收入':'支出');
 if(amt<=0){toast('请输入金额');return;}
 const r=R(),c=child(r);const signed=MTYPE==='in'?amt:-amt;
 if(MEDIT){const rec=c.money_log.find(x=>x.id===MEDIT);
  if(isBucketLog(rec)){toast('三分罐流水不可编辑（与罐余额绑定）');return;}/* v7.3 补丁T-3：处理函数层兜底拦截 */
  if(rec){rec.amount=signed;rec.source=desc;}recalcMoney(c);}
 else if(ROLE==='child'){c.money_log.unshift({id:uid(),ts:nowISO(),amount:signed,source:desc,status:'pending'});notify(c,'parent','零花钱待确认：'+desc);childSubmitEvent('money',{amount:signed,desc:desc});}
 else{c.money_log.unshift({id:uid(),ts:nowISO(),amount:signed,source:desc,status:'confirmed'});recalcMoney(c);}
 saveChild(r,c);render();closeM('mMoney');toast('💰 已保存');
}

function delMoney(id){if(!reqP())return;const r=R(),c=child(r);const _rec=c.money_log.find(x=>x.id===id);
 if(isBucketLog(_rec)){toast('三分罐流水不可删除（与罐余额绑定）');return;}/* v7.3 补丁T-3：处理函数层拦截删除 */
 if(!confirm('删除这条记录？'))return;c.money_log=c.money_log.filter(x=>x.id!==id);recalcMoney(c);saveChild(r,c);render();toast('已删除');}
function recalcMoney(c){let b=0;for(let i=c.money_log.length-1;i>=0;i--){const rec=c.money_log[i];if(rec.status==='confirmed'){if(rec.bucket&&/_spend$/.test(rec.bucket)){/* v7.1 补丁#12(P-12)：罐内支出已在分配时离开主钱包，不再二次扣主余额 */rec.balance_after=Math.round(b*100)/100;}else{b+=rec.amount;rec.balance_after=Math.round(b*100)/100;}}}c.money=Math.round(b*100)/100;}

function applyRedeem(id){const r=R(),c=child(r);const item=c.shop.find(x=>x.id===id);if(!item)return;
 if(c.stars<item.cost){toast('星星不足，还差'+(item.cost-c.stars)+'★');return;}

 c.stars-=item.cost;c.frozen+=item.cost; /* 冻结 */
 c.redemptions.unshift({id:uid(),reward_id:id,name:item.name,icon:item.icon,cost:item.cost,status:'pending',applied_at:nowISO()});
 notify(c,'parent','新兑换申请：'+item.name+'（'+item.cost+'★）');

function reviewRedeem(id,ok){if(!reqP())return;const r=R(),c=child(r);const rd=c.redemptions.find(x=>x.id===id);if(!rd)return;
 if(ok){c.frozen=Math.max(0,c.frozen-rd.cost);rd.status='approved';rd.handled_at=nowISO();
  c.txs.unshift({id:uid(),ts:nowISO(),change:-rd.cost,type:'redeem',remark:'兑换：'+rd.name,balance_after:c.stars});
  const item=c.shop.find(x=>x.id===rd.reward_id);if(item&&item.stock>0)item.stock-=1;
  notify(c,'child','兑换已通过：'+rd.name);toast('已发放：'+rd.name);}
 else{c.frozen=Math.max(0,c.frozen-rd.cost);c.stars+=rd.cost;rd.status='rejected';rd.handled_at=nowISO();
  notify(c,'child','兑换被驳回，星星已返还：'+rd.name);toast('已驳回，返还'+rd.cost+'★');}
 saveChild(r,c);render();}

/* ===== v7.6 数据备份/恢复（完整 gracie_v3 JSON，本地单机版核心保障） ===== */
/* 导出：把完整 gracie_v3 数据导出为带日期的 JSON 文件下载保存 */
function backupExportJSON(){if(!reqP())return;
 let raw;try{raw=localStorage.getItem(ROOT);}catch(e){raw=null;}
 if(!raw){toast('暂无数据可备份');return;}
 /* 包一层元信息，便于校验与人读，但 data 即原始 gracie_v3 */
 let dataObj;try{dataObj=JSON.parse(raw);}catch(e){toast('本地数据异常，无法备份');return;}
 const pkg={app:'成长冒险岛',type:'gracie-backup',storeKey:ROOT,version:'v8.3',exportedAt:new Date().toISOString(),data:dataObj};
 const json=JSON.stringify(pkg,null,2);
 const blob=new Blob([json],{type:'application/json;charset=utf-8'});
 const a=document.createElement('a');a.href=URL.createObjectURL(blob);
 a.download='成长冒险岛备份_v8.3_'+tKey()+'.json';
 document.body.appendChild(a);a.click();a.remove();
 setTimeout(()=>URL.revokeObjectURL(a.href),1000);
 toast('✅ 备份已导出（请妥善保存该 JSON 文件）');}

/* 选择 JSON 文件 → 校验 → 覆盖确认 → 恢复 gracie_v3 */
function backupImportJSON(){if(!reqP())return;
 const inp=document.getElementById('restoreFileInput');
 if(!inp){toast('恢复入口缺失');return;}
 inp.value='';inp.click();}

function handleRestoreFile(ev){if(!reqP())return;
 const file=ev.target.files&&ev.target.files[0];
 if(!file){return;}
 const reader=new FileReader();
 reader.onload=function(){
   let parsed;
   try{parsed=JSON.parse(reader.result);}catch(e){toast('❌ 文件不是合法 JSON，恢复已取消');ev.target.value='';return;}
   /* 兼容两种格式：① v7.6 备份包 {data:{...}} ② 直接的 gracie_v3 根对象 */
   let dataObj=null;
   if(parsed&&typeof parsed==='object'&&parsed.data&&typeof parsed.data==='object'&&parsed.data.childData){dataObj=parsed.data;}
   else if(parsed&&typeof parsed==='object'&&parsed.childData){dataObj=parsed;}
   /* 格式校验：必须含 childData，且至少一个孩子结构合理 */
   if(!dataObj||typeof dataObj.childData!=='object'||dataObj.childData===null){toast('❌ 文件结构不符（缺少 childData），恢复已取消');ev.target.value='';return;}
   const ids=Object.keys(dataObj.childData);
   if(!ids.length){toast('❌ 备份中没有任何孩子数据，恢复已取消');ev.target.value='';return;}
   const sample=dataObj.childData[ids[0]];
   if(!sample||typeof sample!=='object'||sample.name===undefined){toast('❌ 孩子数据格式异常，恢复已取消');ev.target.value='';return;}
   /* 概要信息供用户确认 */
   const names=ids.map(id=>dataObj.childData[id].name).join('、');
   const when=parsed&&parsed.exportedAt?('\n备份时间：'+parsed.exportedAt.slice(0,19).replace('T',' ')):'';
   if(!confirm('即将用所选备份覆盖当前全部数据：\n\n孩子（'+ids.length+'）：'+names+when+'\n\n⚠️ 当前设备上的现有数据将被完全替换且无法撤销。\n建议先「导出备份」保存当前数据。\n\n确认恢复并覆盖吗？')){toast('已取消恢复');ev.target.value='';return;}
   if(!confirm('再次确认：用备份文件覆盖当前数据？')){toast('已取消恢复');ev.target.value='';return;}
   try{
     localStorage.setItem(ROOT,JSON.stringify(dataObj));
     localStorage.removeItem(ROOT+'_session'); /* 清会话，回登录页重新进入，确保读取新数据 */
   }catch(e){toast('❌ 写入失败：'+(e&&e.message?e.message:'存储异常'));ev.target.value='';return;}
   ev.target.value='';
   alert('✅ 恢复成功！将重新加载应用以载入备份数据。');
   location.reload();
 };
 reader.onerror=function(){toast('❌ 读取文件失败，恢复已取消');ev.target.value='';};
 reader.readAsText(file,'utf-8');}

/* ===== 数据导出（CSV，呼应纸质成长表） ===== */
function exportData(){const c=child(R());let rows=[['类型','日期/时间','内容','数值','余额']];
 c.txs.slice().reverse().forEach(t=>rows.push(['星星',t.ts.slice(0,16).replace('T',' '),t.remark,(t.change>0?'+':'')+t.change+'★',t.balance_after+'★']));
 /* v7.3 补丁T-3：CSV 余额列与页面口径一致——罐取出(*_spend)显示「罐余」快照，其余显示主钱包余额 */
 c.money_log.slice().reverse().forEach(m=>{if(m.status==='confirmed'){
   const _isBk=/_spend$/.test(m.bucket||'');
   const _bal=_isBk?('罐余'+fmtMoney(m.bucketBalAfter||0)):fmtMoney(m.balance_after||0);
   rows.push(['零花钱',m.ts.slice(0,16).replace('T',' '),m.source,(m.amount>0?'+':'')+fmtMoney(m.amount),_bal]);
 }});
 const csv='\ufeff'+rows.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(',')).join('\n');
 const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='成长冒险岛数据_v8.3_'+c.name+'_'+tKey()+'.csv';a.click();toast('已导出CSV');}

function goPin(role){

 /* v8.0：云端已配置但家长/管理员尚未登录家庭邮箱账号 → 先邮箱登录，再端内 PIN 二次校验 */

function goPinUI(title){PIN_BUF='';document.getElementById('roleSelect').style.display='none';const cp=document.getElementById('childPick');if(cp)cp.style.display='none';document.getElementById('pinBox').style.display='block';setText('pinTitle',title);setText('pinSub','请输入密码');drawPinDots();}
function backRole(){PIN_BUF='';document.getElementById('roleSelect').style.display='block';document.getElementById('childPick').style.display='none';document.getElementById('pinBox').style.display='none';setText('pinErr','');}
function drawPinDots(){let h='';for(let i=0;i<4;i++)h+='<div class="pin-dot'+(i<PIN_BUF.length?' fill':'')+'"></div>';setHTML('pinDots',h);}
function pinPress(n){if(PIN_BUF.length>=4)return;PIN_BUF+=n;drawPinDots();if(PIN_BUF.length===4)setTimeout(checkPin,140);}
function pinBack(){PIN_BUF=PIN_BUF.slice(0,-1);drawPinDots();setText('pinErr','');}
function checkPin(){const r=R();let ok=false;
 if(PIN_TARGET.role==='admin')ok=checkPwd(PIN_BUF,r.adminCred);
 else if(PIN_TARGET.role==='parent')ok=checkPwd(PIN_BUF,r.parentCred);
 else ok=checkPwd(PIN_BUF,r.childData[PIN_TARGET.cid].cred);
 if(ok){
  if(PIN_TARGET.role==='admin'){REALROLE='admin';ROLE='admin';IMP=false;}
  else if(PIN_TARGET.role==='parent'){REALROLE='parent';ROLE='parent';IMP=false;}
  else{REALROLE='child';ROLE='child';IMP=false;r.curChild=PIN_TARGET.cid;CID=PIN_TARGET.cid;saveRoot(r);}
  /* 会话只保存"真实身份"；孩子会话永远无法恢复成家长/管理视图 */
  localStorage.setItem(ROOT+'_session',JSON.stringify({realrole:REALROLE,cid:r.curChild}));
  enterApp();

async function migrateLocalToCloud(){

 if(!(CLOUD.session&&CLOUD.session.user)){toast('请先用家庭邮箱账号登录');return;}

 const r=R();const ids=r.children||[];
 if(!ids.length){toast('本地没有可迁移的孩子数据');return;}
 if(!confirm('将把本设备当前 '+ids.length+' 个孩子的全部数据上传到云端家庭账号。\n云端同名孩子将以本地数据为准覆盖。是否继续？'))return;

}

/* ===== TV 倒计时 ===== */
function tvAvailSec(c){const day=dd(c);return Math.max(0,(availMin(c)-day.scrUsed)*60);}
function fmtClock(sec){sec=Math.max(0,Math.round(sec));const m=Math.floor(sec/60),x=sec%60;return p2(m)+':'+p2(x);}
function tvStart(){const r=R(),c=child(r);const av=tvAvailSec(c);if(av<=0){toast('今天没有可用的娱乐屏幕时间');return;}c.tv.running=true;c.tv.startTs=Date.now();c.tv.allowSec=av;saveChild(r,c);runTimerLoop();toast('▶️ 开始计时');}
function tvStop(manual){const r=R(),c=child(r);if(!c.tv.running)return;const el=Math.floor((Date.now()-c.tv.startTs)/1000);const used=Math.min(el,c.tv.allowSec);const usedMin=Math.max(1,Math.round(used/60));c.tv.running=false;c.tv.startTs=0;saveChild(r,c);if(TIMER){clearInterval(TIMER);TIMER=null;}addScr(usedMin);
 if(!manual){notify(child(R()),'child','今日娱乐时间已用完');if(child(R()).cfg.lockOnEnd){CELE={emoji:'🔒',t:'时间到，屏幕锁定',s:'今天的娱乐时间用完啦，明天再来～'};showCele();}toast('⏰ 时间到！已扣除'+usedMin+'分钟');}
 else toast('⏹️ 已停止，扣除'+usedMin+'分钟');}
function runTimerLoop(){if(TIMER)clearInterval(TIMER);TIMER=setInterval(()=>{const c=child(R());if(!c.tv.running){clearInterval(TIMER);TIMER=null;return;}const el=Math.floor((Date.now()-c.tv.startTs)/1000);const remain=c.tv.allowSec-el;const cl=document.getElementById('tvClock');if(remain<=0){tvStop(false);return;}if(cl)cl.textContent=fmtClock(remain);const pb=document.getElementById('tvBar');if(pb&&c.tv.allowSec>0)pb.style.width=(100-remain/c.tv.allowSec*100)+'%';},500);}

 else{sw.style.display='';sw.textContent='退出登录';sw.onclick=childLogout;} /* 真实孩子：可退出登录回到账号选择(需家长/管理PIN才能进对应端，隔离不破坏) */

function childLogout(){if(REALROLE!=='child'){logout();return;}if(!confirm('确定退出登录吗？你的星星、存折和记录都会保留。'))return;logout();}

/* ===== INIT ===== */
function init(){buildModals();buildHeaderBtns();
 /* v8.0：预热内存缓存（先用本地，云端 cloudInit 异步刷新后会自动重绘） */
 if(!CACHE){const _l=localGetRoot();if(_l)CACHE=_l;}
 /* 启动云数据层（异步，不阻塞首屏；未配置/离线时自动回退本地模式） */
 try{ cloudInit(); }catch(e){ console.warn('cloudInit error',e); }
 /* 实时兜底轮询：云端 Realtime 不可用或本地模式时，每 4 秒比对一次本地快照，发现变化即重绘
    （配合 BroadcastChannel，确保"另一端 5 秒内刷新"在各种环境都成立） */
 startRealtimePollFallback();
 /* v7.1 补丁#7(P-07)：专注计时切后台/回来二次校验——到点结算、未到点续跑 */
 document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){
   if(!ROLE)return; /* 未登录不处理 */
   const c=child(R());
   if(c&&c.focus&&c.focus.running){
    if(Date.now()>=c.focus.deadline){ /* 回来已到点 → 结算完成 */
     const r=R(),cc=child(r);focusComplete(cc,cc.focus.durMin);saveChild(r,cc);render();
    }else{runFocusLoop();} /* 未到点 → 续跑计时 */
   }
  }
 });
 const ses=localStorage.getItem(ROOT+'_session');
 renderLogin();
 if(ses){try{const s=JSON.parse(ses);const r=R();const rr=s.realrole||s.role;/*兼容旧会话*/ if(rr==='admin'){REALROLE='admin';ROLE='admin';IMP=false;enterApp();return;}if(rr==='parent'){REALROLE='parent';ROLE='parent';IMP=false;enterApp();return;}if(rr==='child'&&r.childData[s.cid]){REALROLE='child';ROLE='child';IMP=false;r.curChild=s.cid;CID=s.cid;saveRoot(r);enterApp();return;}}catch(e){}}
 document.getElementById('loginScreen').style.display='block';document.getElementById('mainApp').style.display='none';
}
/* ===== v8.0 实时兜底轮询：比对本地快照哈希，变化即重绘（与 BroadcastChannel/Realtime 互补） ===== */
let _RT_SNAP=null,_RT_TIMER=null;
function startRealtimePollFallback(){ if(_RT_TIMER)clearInterval(_RT_TIMER);
  _RT_TIMER=setInterval(()=>{ try{
    if(typeof ROLE==='undefined'||!ROLE)return;
    /* 云端模式：周期性轻量拉取，确保对端变更落地（Realtime 已实时，此为兜底） */
    if(typeof cloudActive==='function'&&cloudActive()){ return; }
    /* 本地/离线模式：检测 localStorage 是否被其它标签页改动 */
    const raw=localStorage.getItem(ROOT_LOCAL)||'';
    if(_RT_SNAP===null){_RT_SNAP=raw;return;}
    if(raw!==_RT_SNAP){_RT_SNAP=raw;const fresh=localGetRoot();if(fresh){CACHE=fresh;scheduleRender();}}
  }catch(e){} },4000);
}
init();

/* ===== v7.6 PWA：注册 Service Worker（离线缓存，添加到主屏幕后断网可用） ===== */
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('service-worker.js').then(function(reg){
      /* 注册成功，静默 */
    }).catch(function(err){
      /* 注册失败不影响应用正常使用（如本地 file:// 直接打开时） */
      console.warn('Service Worker 注册失败（不影响在线使用）:',err);
    });
  });
}
